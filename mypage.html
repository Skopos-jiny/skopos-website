<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>마이페이지 | SKOPOS 스코포스</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Apple SD Gothic Neo','Noto Sans KR',sans-serif;background:#F7F8FC;min-height:100vh;-webkit-font-smoothing:antialiased}
nav{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.95);backdrop-filter:blur(16px);border-bottom:1px solid rgba(0,0,0,.06);height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 24px}
.nav-logo{font-size:1.1rem;font-weight:900;color:#0F0F1A;text-decoration:none}
.nav-logo span{color:#E91E8C}
.nav-right{display:flex;align-items:center;gap:12px}
.nav-user{font-size:.8rem;color:#8890A4;font-weight:600}
.btn-logout{font-size:.78rem;color:#8890A4;background:none;border:1px solid rgba(0,0,0,.1);border-radius:50px;padding:6px 14px;cursor:pointer;font-family:inherit;transition:all .2s}
.btn-logout:hover{border-color:#E91E8C;color:#E91E8C}
.container{max-width:760px;margin:0 auto;padding:28px 20px 60px}

/* 프로필 카드 */
.profile-card{background:linear-gradient(135deg,#0F0F1A,#1E1040);border-radius:20px;padding:26px;margin-bottom:22px;display:flex;align-items:center;gap:18px}
.avatar{width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,#E91E8C,#FF6B9D);display:flex;align-items:center;justify-content:center;font-size:1.4rem;font-weight:900;color:#fff;flex-shrink:0}
.profile-info{flex:1;min-width:0}
.profile-name{font-size:1.05rem;font-weight:800;color:#fff;margin-bottom:3px}
.profile-email{font-size:.76rem;color:rgba(255,255,255,.45);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.profile-badge{display:inline-block;font-size:.62rem;font-weight:700;padding:3px 10px;border-radius:50px;margin-top:6px}
.badge-kakao{background:#FEE500;color:#191919}
.badge-naver{background:#03C75A;color:#fff}
.badge-email{background:rgba(233,30,140,.2);color:#FF6B9D}
.profile-stat{text-align:right;flex-shrink:0}
.stat-num{font-size:1.5rem;font-weight:900;color:#E91E8C}
.stat-label{font-size:.68rem;color:rgba(255,255,255,.35);margin-top:2px}

/* 섹션 */
.section{background:#fff;border-radius:16px;padding:22px;margin-bottom:16px;box-shadow:0 2px 12px rgba(0,0,0,.05)}
.section-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.section-tag{font-size:.64rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;color:#E91E8C}
.section-title{font-size:1rem;font-weight:800;color:#0F0F1A;margin-top:4px}

/* 탭 */
.tab-row{display:flex;background:#F7F8FC;border-radius:10px;padding:3px;margin-bottom:20px}
.tab-btn{flex:1;padding:8px;text-align:center;font-size:.78rem;font-weight:700;color:#8890A4;border-radius:8px;cursor:pointer;border:none;background:none;font-family:inherit;transition:all .2s}
.tab-btn.active{background:#fff;color:#0F0F1A;box-shadow:0 1px 6px rgba(0,0,0,.08)}

/* 진단 결과 카드 */
.result-card{border:1.5px solid rgba(0,0,0,.07);border-radius:14px;padding:18px;margin-bottom:12px;display:flex;align-items:center;gap:14px;transition:all .2s}
.result-card:hover{border-color:rgba(233,30,140,.2);transform:translateX(2px)}
.result-emoji{font-size:2rem;flex-shrink:0}
.result-info{flex:1;min-width:0}
.result-type{font-size:.95rem;font-weight:800;color:#0F0F1A;margin-bottom:3px}
.result-meta{font-size:.72rem;color:#8890A4}
.result-actions{display:flex;gap:8px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end}
.btn-sm{font-size:.72rem;font-weight:700;padding:6px 14px;border-radius:50px;cursor:pointer;border:none;font-family:inherit;transition:all .2s;white-space:nowrap}
.btn-view{background:rgba(233,30,140,.08);color:#E91E8C}
.btn-view:hover{background:rgba(233,30,140,.15)}
.btn-pdf{background:#0F0F1A;color:#fff}
.btn-pdf:hover{background:#2A2A3C}
.btn-pdf:disabled{opacity:.5;cursor:not-allowed}
.badge-type{font-size:.62rem;font-weight:700;padding:2px 8px;border-radius:50px;white-space:nowrap}
.badge-premium{background:linear-gradient(135deg,#E91E8C,#FF9800);color:#fff}
.badge-free{background:rgba(0,0,0,.06);color:#8890A4}

/* 결제 내역 */
.pay-item{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-bottom:1px solid rgba(0,0,0,.05)}
.pay-item:last-child{border-bottom:none}
.pay-left{flex:1;min-width:0}
.pay-name{font-size:.88rem;font-weight:700;color:#0F0F1A;margin-bottom:3px}
.pay-detail{font-size:.72rem;color:#8890A4}
.pay-right{text-align:right;flex-shrink:0;margin-left:12px}
.pay-amount{font-size:.9rem;font-weight:800;color:#0F0F1A;margin-bottom:3px}
.pay-status{display:inline-block;font-size:.62rem;font-weight:700;padding:2px 8px;border-radius:50px;background:rgba(3,199,90,.1);color:#027a35}

/* 빈 상태 */
.empty{text-align:center;padding:36px 0}
.empty-icon{font-size:2.8rem;margin-bottom:10px}
.empty-text{font-size:.86rem;color:#8890A4;line-height:1.7;margin-bottom:16px}
.btn-cta{display:inline-block;padding:12px 28px;background:linear-gradient(135deg,#E91E8C,#FF6B9D);color:#fff;border-radius:50px;font-size:.85rem;font-weight:800;text-decoration:none;transition:all .2s}
.btn-cta:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(233,30,140,.3)}

/* 로딩 */
.loading{display:flex;align-items:center;justify-content:center;padding:40px;color:#8890A4;font-size:.86rem;gap:10px}
.spinner{width:20px;height:20px;border:2px solid rgba(233,30,140,.2);border-top-color:#E91E8C;border-radius:50%;animation:spin 1s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* 토스트 */
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:#0F0F1A;color:#fff;padding:10px 22px;border-radius:50px;font-size:.8rem;font-weight:700;opacity:0;transition:all .3s;z-index:999;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* 패널 */
.panel{display:none}
.panel.active{display:block}
@media(max-width:500px){.result-actions{gap:6px}.btn-sm{font-size:.66rem;padding:5px 10px}}
</style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">SKO<span>POS</span></a>
  <div class="nav-right">
    <span class="nav-user" id="navUser"></span>
    <button class="btn-logout" onclick="logout()">로그아웃</button>
  </div>
</nav>

<div class="container">

  <!-- 프로필 -->
  <div class="profile-card">
    <div class="avatar" id="avatarEl">?</div>
    <div class="profile-info">
      <div class="profile-name" id="profileName">로딩 중...</div>
      <div class="profile-email" id="profileEmail"></div>
      <span class="profile-badge" id="profileBadge"></span>
    </div>
    <div class="profile-stat">
      <div class="stat-num" id="statNum">0</div>
      <div class="stat-label">완료한 검사</div>
    </div>
  </div>

  <!-- 탭 -->
  <div class="tab-row">
    <button class="tab-btn active" onclick="switchTab('results',this)">🎯 나의 검사 결과</button>
    <button class="tab-btn" onclick="switchTab('payments',this)">💳 결제 내역</button>
  </div>

  <!-- 검사 결과 패널 -->
  <div class="panel active" id="panelResults">
    <div id="resultsArea"><div class="loading"><div class="spinner"></div>불러오는 중...</div></div>
  </div>

  <!-- 결제 내역 패널 -->
  <div class="panel" id="panelPayments">
    <div id="paymentsArea"><div class="loading"><div class="spinner"></div>불러오는 중...</div></div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL  = 'https://rgbukqphcqptnfeqipfn.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJnYnVrcXBoY3FwdG5mZXFpcGZuIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg2OTkzMDMsImV4cCI6MjA5NDI3NTMwM30.fWUHe2AoWr9fMLUNSQkbhosUO7FH9dvZOIZbz_XyzFM';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON);

let currentUser = null;

// ── 유형 정보 ────────────────────────────────────────────────
const TYPE_INFO = {
  'sanctuary_deep': {name:'완전 차단형',      emoji:'🌙'},
  'sanctuary_zen':  {name:'비움 추구형',       emoji:'🤍'},
  'nature_forest':  {name:'초록 충전형',       emoji:'🌿'},
  'nature_earth':   {name:'핸드메이드 감성형', emoji:'🪴'},
  'luxe_royal':     {name:'품격 추구형',       emoji:'✨'},
  'luxe_gallery':   {name:'갤러리 큐레이터형', emoji:'🖼️'},
  'artistic_bold':  {name:'개성 폭발형',       emoji:'🎨'},
  'artistic_vintage':{name:'빈티지 스토리형',  emoji:'🕰️'},
  'minimal_empty':  {name:'극도 미니멀형',     emoji:'◻️'},
  'minimal_grid':   {name:'구조·정렬 추구형',  emoji:'⬛'},
  'cozy_warm':      {name:'포근함 최우선형',   emoji:'🛋️'},
  'cozy_family':    {name:'함께하는 공간형',   emoji:'🏡'},
};

// ── 탭 전환 ──────────────────────────────────────────────────
function switchTab(tab, btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.getElementById('panel'+tab.charAt(0).toUpperCase()+tab.slice(1)).classList.add('active');
}

// ── 토스트 ───────────────────────────────────────────────────
function toast(msg, dur=2800){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), dur);
}

// ── 초기화 ───────────────────────────────────────────────────
(async()=>{
  const { data:{ session } } = await sb.auth.getSession();
  if(!session){
    window.location.href = 'login.html?redirect=mypage.html';
    return;
  }
  currentUser = session.user;
  const meta     = session.user.user_metadata || {};
  const provider = session.user.app_metadata?.provider || 'email';
  const name     = meta.full_name || meta.name || session.user.email?.split('@')[0] || '사용자';
  const email    = session.user.email || '';

  document.getElementById('avatarEl').textContent   = name.charAt(0).toUpperCase();
  document.getElementById('profileName').textContent = name;
  document.getElementById('profileEmail').textContent= email;
  document.getElementById('navUser').textContent     = name + '님';

  const badgeEl = document.getElementById('profileBadge');
  if(provider==='kakao'){badgeEl.textContent='카카오 로그인';badgeEl.className='profile-badge badge-kakao';}
  else if(provider==='naver'){badgeEl.textContent='네이버 로그인';badgeEl.className='profile-badge badge-naver';}
  else{badgeEl.textContent='이메일 가입';badgeEl.className='profile-badge badge-email';}

  // 병렬 로드
  await Promise.all([renderResults(session.user), renderPayments(session.user)]);
})();

// ── 검사 결과 렌더링 ─────────────────────────────────────────
async function renderResults(user){
  const area = document.getElementById('resultsArea');
  const { data, error } = await sb
    .from('quiz_results')
    .select('*')
    .eq('user_id', user.id)
    .order('created_at', { ascending: false });

  if(error || !data || data.length === 0){
    // 세션스토리지 폴백
    const premId = sessionStorage.getItem('skopos_premium_result');
    const freeId = sessionStorage.getItem('skopos_result');
    if(!premId && !freeId){
      area.innerHTML = `<div class="empty">
        <div class="empty-icon">🔍</div>
        <div class="empty-text">아직 완료한 검사가 없어요<br>지금 바로 내 공간 욕구 유형을 확인해보세요!</div>
        <a class="btn-cta" href="skopos_quiz.html">SDTI 기초 검사 (무료)</a>
      </div>`;
      document.getElementById('statNum').textContent = '0';
      return;
    }
    // 세션에서 임시 표시
    let cards = [];
    if(premId){ const t=TYPE_INFO[premId]||{name:premId,emoji:'✨'}; cards.push({result_type:premId,quiz_type:'SDTI 정밀',created_at:new Date().toISOString(),t}); }
    if(freeId){ const t=TYPE_INFO[freeId]||{name:freeId,emoji:'✨'}; cards.push({result_type:freeId,quiz_type:'SDTI 기초',created_at:new Date().toISOString(),t}); }
    area.innerHTML = cards.map(r=>makeResultCard(r)).join('');
    document.getElementById('statNum').textContent = cards.length;
    return;
  }

  document.getElementById('statNum').textContent = data.length;
  area.innerHTML = data.map(r=>makeResultCard(r)).join('');
}

function makeResultCard(r){
  const t   = TYPE_INFO[r.result_type] || {name: r.result_name||r.result_type, emoji:'✨'};
  const date = r.created_at ? new Date(r.created_at).toLocaleDateString('ko-KR') : '';
  const isPrem = r.quiz_type && r.quiz_type.includes('정밀');
  const resultUrl = isPrem
    ? `skopos_premium_quiz.html?r=${btoa(encodeURIComponent(r.result_type))}`
    : `skopos_quiz.html`;
  const pdfBtn = isPrem
    ? `<button class="btn-sm btn-pdf" onclick="redownloadPDF('${r.result_type}','${r.result_name||t.name}')" title="PDF 리포트 다운로드">📄 PDF 저장</button>`
    : '';
  return `<div class="result-card">
    <span class="result-emoji">${t.emoji}</span>
    <div class="result-info">
      <div class="result-type">${t.name}</div>
      <div class="result-meta">${r.quiz_type||'기초'} 검사 · ${date}</div>
    </div>
    <div class="result-actions">
      <span class="badge-type ${isPrem?'badge-premium':'badge-free'}">${r.quiz_type||'기초'}</span>
      <a class="btn-sm btn-view" href="${resultUrl}">결과 보기</a>
      ${pdfBtn}
    </div>
  </div>`;
}

// ── 결제 내역 렌더링 ─────────────────────────────────────────
async function renderPayments(user){
  const area = document.getElementById('paymentsArea');
  const { data, error } = await sb
    .from('payments')
    .select('*')
    .or(`buyer_email.eq.${user.email},user_id.eq.${user.id}`)
    .order('paid_at', { ascending: false });

  if(error || !data || data.length === 0){
    area.innerHTML = `<div class="empty">
      <div class="empty-icon">💳</div>
      <div class="empty-text">아직 결제 내역이 없어요<br>SDTI 정밀 검사로 더 깊이 알아보세요</div>
      <a class="btn-cta" href="payment.html">SDTI 정밀 검사 ₩9,900</a>
    </div>`;
    return;
  }

  area.innerHTML = `<div>
    ${data.map(p=>{
      const date = new Date(p.paid_at || p.created_at).toLocaleDateString('ko-KR');
      const time = new Date(p.paid_at || p.created_at).toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit'});
      return `<div class="pay-item">
        <div class="pay-left">
          <div class="pay-name">${p.order_name||'SKOPOS SDTI 정밀 검사'}</div>
          <div class="pay-detail">${date} ${time} · ${p.pg||'NHN KCP'} · 주문번호: ${(p.merchant_uid||p.imp_uid||'').slice(-12)}</div>
        </div>
        <div class="pay-right">
          <div class="pay-amount">₩${(p.amount||9900).toLocaleString()}</div>
          <span class="pay-status">${p.status==='paid'||p.status==='PAID'?'결제완료':'처리중'}</span>
        </div>
      </div>`;
    }).join('')}
  </div>
  <div style="margin-top:16px;padding:12px 14px;background:#F7F8FC;border-radius:10px;font-size:.74rem;color:#8890A4;line-height:1.7">
    💡 결제 관련 문의: contact@skopos.kr · 환불은 결제일로부터 7일 이내 미이용 시 가능
  </div>`;
}

// ── PDF 재다운로드 ───────────────────────────────────────────
async function redownloadPDF(resultTypeId, resultName){
  const btn = event.target;
  btn.disabled = true;
  btn.textContent = '⏳ 생성 중...';
  toast('PDF 생성 중이에요. 잠시 기다려주세요.', 4000);

  // 프리미엄 퀴즈 페이지로 이동해서 PDF 생성
  // URL에 r= 파라미터와 pdf=1 파라미터 추가
  const resultB64 = btoa(encodeURIComponent(resultTypeId));
  window.open(`skopos_premium_quiz.html?r=${resultB64}&pdf=1`, '_blank');

  setTimeout(()=>{ btn.disabled=false; btn.textContent='📄 PDF 저장'; }, 3000);
}

// ── 로그아웃 ─────────────────────────────────────────────────
async function logout(){
  await sb.auth.signOut();
  window.location.href = 'login.html';
}
</script>
</body>
</html>
