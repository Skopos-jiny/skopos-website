<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>취향저격 진단 | SKOPOS</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --gold: #c9a96e;
            --gold-light: #e8d5b0;
            --black: #0c0c0c;
            --off-black: #111111;
            --dark: #1a1a1a;
            --gray: #888;
            --white: #fafaf8;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--black);
            color: var(--white);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ── NAV ── */
        nav {
            position: fixed; top: 0; left: 0; right: 0; z-index: 100;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 48px; height: 64px;
            background: rgba(12,12,12,0.9);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(201,169,110,0.12);
        }
        .nav-logo {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3rem; font-weight: 600;
            letter-spacing: 0.3em; color: var(--white);
            text-decoration: none;
        }
        .nav-back {
            font-size: 0.72rem; letter-spacing: 0.12em;
            text-transform: uppercase; color: var(--gray);
            text-decoration: none; transition: color 0.3s;
        }
        .nav-back:hover { color: var(--gold); }

        /* ── WRAPPER ── */
        .quiz-wrap {
            min-height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: 100px 24px 60px;
        }

        /* ── PROGRESS ── */
        .progress-wrap {
            width: 100%; max-width: 600px;
            margin-bottom: 48px;
        }
        .progress-meta {
            display: flex; justify-content: space-between;
            align-items: center; margin-bottom: 10px;
        }
        .progress-label {
            font-size: 0.68rem; letter-spacing: 0.2em;
            text-transform: uppercase; color: var(--gray);
        }
        .progress-timer {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.1rem; color: var(--gold);
        }
        .progress-bar-bg {
            width: 100%; height: 2px;
            background: rgba(255,255,255,0.07);
        }
        .progress-bar-fill {
            height: 2px; background: var(--gold);
            transition: width 0.5s ease;
        }

        /* ── QUESTION CARD ── */
        .q-card {
            width: 100%; max-width: 600px;
            opacity: 0; transform: translateY(20px);
            animation: fadeUp 0.5s ease forwards;
        }
        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }
        .q-eyebrow {
            font-size: 0.65rem; letter-spacing: 0.25em;
            text-transform: uppercase; color: var(--gold);
            margin-bottom: 16px;
        }
        .q-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(1.6rem, 4vw, 2.4rem);
            font-weight: 300; line-height: 1.3;
            color: var(--white); margin-bottom: 10px;
        }
        .q-title em { font-style: italic; color: var(--gold); }
        .q-sub {
            font-size: 0.8rem; color: var(--gray);
            margin-bottom: 36px; line-height: 1.6;
        }

        /* ── OPTIONS ── */
        .options-grid {
            display: grid;
            gap: 12px;
        }
        .options-grid.col2 { grid-template-columns: 1fr 1fr; }
        .options-grid.col1 { grid-template-columns: 1fr; }

        .opt {
            position: relative;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            padding: 18px 20px;
            cursor: pointer;
            transition: all 0.25s ease;
            display: flex; align-items: flex-start; gap: 14px;
            text-align: left;
            overflow: hidden;
        }
        .opt:hover {
            border-color: rgba(201,169,110,0.4);
            background: rgba(201,169,110,0.05);
        }
        .opt.selected {
            border-color: var(--gold);
            background: rgba(201,169,110,0.1);
        }
        .opt.selected .opt-check { opacity: 1; }
        .opt-swatch {
            width: 36px; height: 36px;
            flex-shrink: 0; border-radius: 0;
        }
        .opt-body { flex: 1; }
        .opt-label {
            font-size: 0.88rem; font-weight: 400;
            color: var(--white); margin-bottom: 3px;
            line-height: 1.3;
        }
        .opt-desc {
            font-size: 0.72rem; color: var(--gray);
            line-height: 1.5;
        }
        .opt-check {
            position: absolute; top: 12px; right: 14px;
            width: 16px; height: 16px;
            border: 1px solid var(--gold);
            background: var(--gold);
            display: flex; align-items: center; justify-content: center;
            font-size: 0.6rem; color: var(--black);
            opacity: 0; transition: opacity 0.2s;
            flex-shrink: 0;
        }

        /* ── EMOJI GRID (분위기) ── */
        .mood-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .mood-opt {
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(255,255,255,0.03);
            padding: 20px 12px;
            cursor: pointer;
            text-align: center;
            transition: all 0.25s ease;
        }
        .mood-opt:hover {
            border-color: rgba(201,169,110,0.4);
            background: rgba(201,169,110,0.05);
        }
        .mood-opt.selected {
            border-color: var(--gold);
            background: rgba(201,169,110,0.1);
        }
        .mood-emoji { font-size: 1.8rem; margin-bottom: 8px; }
        .mood-label { font-size: 0.78rem; color: var(--white); margin-bottom: 3px; }
        .mood-sub { font-size: 0.65rem; color: var(--gray); }

        /* ── NAV BUTTONS ── */
        .q-nav {
            display: flex; gap: 12px;
            margin-top: 36px; align-items: center;
        }
        .btn-next {
            flex: 1; padding: 14px;
            background: var(--gold); color: var(--black);
            font-size: 0.75rem; font-weight: 500;
            letter-spacing: 0.15em; text-transform: uppercase;
            border: none; cursor: pointer;
            transition: background 0.3s; opacity: 0.4;
            pointer-events: none;
        }
        .btn-next.active { opacity: 1; pointer-events: all; }
        .btn-next.active:hover { background: var(--gold-light); }
        .btn-prev {
            padding: 14px 20px;
            background: none;
            border: 1px solid rgba(255,255,255,0.12);
            color: var(--gray); font-size: 0.72rem;
            cursor: pointer; transition: all 0.3s;
        }
        .btn-prev:hover { border-color: var(--white); color: var(--white); }

        /* ── INTRO ── */
        #screen-intro {
            width: 100%; max-width: 560px;
            text-align: center;
        }
        .intro-badge {
            display: inline-block;
            border: 1px solid rgba(201,169,110,0.4);
            padding: 5px 16px; font-size: 0.65rem;
            letter-spacing: 0.25em; text-transform: uppercase;
            color: var(--gold); margin-bottom: 32px;
        }
        .intro-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2rem, 5vw, 3.2rem);
            font-weight: 300; line-height: 1.2;
            margin-bottom: 20px;
        }
        .intro-title em { font-style: italic; color: var(--gold); }
        .intro-desc {
            font-size: 0.88rem; color: var(--gray);
            line-height: 1.8; margin-bottom: 12px;
        }
        .intro-meta {
            display: flex; justify-content: center; gap: 32px;
            margin: 32px 0 40px;
        }
        .intro-stat { text-align: center; }
        .intro-stat-val {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.8rem; color: var(--gold); line-height: 1;
        }
        .intro-stat-label {
            font-size: 0.65rem; letter-spacing: 0.1em;
            color: var(--gray); margin-top: 4px;
        }
        .btn-start {
            display: inline-block; padding: 15px 52px;
            background: var(--gold); color: var(--black);
            font-size: 0.78rem; font-weight: 500;
            letter-spacing: 0.18em; text-transform: uppercase;
            border: none; cursor: pointer; transition: background 0.3s;
        }
        .btn-start:hover { background: var(--gold-light); }

        /* ── RESULT ── */
        #screen-result {
            width: 100%; max-width: 640px;
            opacity: 0; animation: fadeUp 0.7s ease forwards 0.2s;
        }
        .result-tag {
            font-size: 0.65rem; letter-spacing: 0.25em;
            text-transform: uppercase; color: var(--gold);
            margin-bottom: 12px;
        }
        .result-type {
            font-family: 'Cormorant Garamond', serif;
            font-size: clamp(2rem, 5vw, 3.5rem);
            font-weight: 300; line-height: 1.15;
            margin-bottom: 6px;
        }
        .result-type em { font-style: italic; color: var(--gold); }
        .result-sub {
            font-size: 0.85rem; color: var(--gray);
            margin-bottom: 32px; line-height: 1.7;
        }
        .result-keywords {
            display: flex; flex-wrap: wrap; gap: 8px;
            margin-bottom: 36px;
        }
        .kw-tag {
            border: 1px solid rgba(201,169,110,0.4);
            padding: 5px 14px; font-size: 0.7rem;
            letter-spacing: 0.1em; color: var(--gold);
        }
        .result-divider {
            width: 40px; height: 1px;
            background: rgba(201,169,110,0.3);
            margin: 32px 0;
        }
        .result-service-label {
            font-size: 0.65rem; letter-spacing: 0.2em;
            text-transform: uppercase; color: var(--gray);
            margin-bottom: 16px;
        }
        .service-rec {
            border: 1px solid rgba(201,169,110,0.3);
            padding: 24px 28px; margin-bottom: 12px;
            display: flex; align-items: flex-start;
            gap: 20px; background: rgba(201,169,110,0.04);
        }
        .service-rec.best { border-color: var(--gold); background: rgba(201,169,110,0.08); }
        .service-rec-badge {
            font-size: 0.58rem; letter-spacing: 0.15em;
            text-transform: uppercase; color: var(--black);
            background: var(--gold); padding: 3px 8px;
            white-space: nowrap; margin-top: 2px;
            flex-shrink: 0;
        }
        .service-rec-body {}
        .service-rec-name {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.3rem; color: var(--white);
            margin-bottom: 4px;
        }
        .service-rec-desc {
            font-size: 0.78rem; color: var(--gray);
            line-height: 1.6;
        }
        .result-actions {
            display: flex; gap: 12px; margin-top: 36px;
        }
        .btn-consult {
            flex: 1; padding: 14px;
            background: var(--gold); color: var(--black);
            font-size: 0.75rem; font-weight: 500;
            letter-spacing: 0.15em; text-transform: uppercase;
            text-decoration: none; text-align: center;
            transition: background 0.3s; border: none; cursor: pointer;
            display: block;
        }
        .btn-consult:hover { background: var(--gold-light); }
        .btn-retry {
            padding: 14px 20px;
            background: none;
            border: 1px solid rgba(255,255,255,0.12);
            color: var(--gray); font-size: 0.72rem;
            cursor: pointer; transition: all 0.3s;
            white-space: nowrap;
        }
        .btn-retry:hover { border-color: var(--white); color: var(--white); }

        /* hidden */
        .screen { display: none; }
        .screen.active { display: flex; flex-direction: column; align-items: center; }

        @media (max-width: 600px) {
            nav { padding: 0 20px; }
            .options-grid.col2 { grid-template-columns: 1fr; }
            .mood-grid { grid-template-columns: repeat(2, 1fr); }
            .result-actions { flex-direction: column; }
        }
    </style>
</head>

</div>

// ══════════════════════════════════════════
// STATE
// ══════════════════════════════════════════
let current = 0;
let answers = {};   // { qId: [tag, tag, ...] }
let timerInterval = null;
let secondsLeft = 90;

// ══════════════════════════════════════════
// UTILS
// ══════════════════════════════════════════
function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function startQuiz() {
    current = 0;
    answers = {};
    secondsLeft = 90;
    showScreen('screen-quiz');
    renderQuestion();
    startTimer();
}

function startTimer() {
    clearInterval(timerInterval);
    timerInterval = setInterval(() => {
        secondsLeft--;
        const m = Math.floor(secondsLeft / 60);
        const s = secondsLeft % 60;
        document.getElementById('timerDisplay').textContent =
            `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
        if (secondsLeft <= 0) {
            clearInterval(timerInterval);
            showResult();
        }
    }, 1000);
}

// ══════════════════════════════════════════
// RENDER QUESTION
// ══════════════════════════════════════════
function renderQuestion() {
    const q = questions[current];
    const pct = (current / questions.length) * 100;
    document.getElementById('progressLabel').textContent = `질문 ${current + 1} / ${questions.length}`;
    document.getElementById('progressFill').style.width = pct + '%';

    const card = document.getElementById('qCard');
    card.style.animation = 'none';
    card.offsetHeight; // reflow
    card.style.animation = '';

    let optionsHTML = '';

    if (q.type === 'mood') {
        optionsHTML = `<div class="mood-grid">` +
            q.options.map((o, i) => `
                <div class="mood-opt" data-index="${i}" onclick="selectOpt(${i})">
                    <div class="mood-emoji">${o.emoji}</div>
                    <div class="mood-label">${o.label}</div>
                    <div class="mood-sub">${o.desc}</div>
                </div>
            `).join('') +
        `</div>`;
    } else {
        optionsHTML = `<div class="options-grid ${q.cols === 2 ? 'col2' : 'col1'}">` +
            q.options.map((o, i) => `
                <div class="opt" data-index="${i}" onclick="selectOpt(${i})">
                    ${o.swatch ? `<div class="opt-swatch" style="background:${o.swatch}"></div>` : ''}
                    <div class="opt-body">
                        <div class="opt-label">${o.label}</div>
                        <div class="opt-desc">${o.desc}</div>
                    </div>
                    <div class="opt-check">✓</div>
                </div>
            `).join('') +
        `</div>`;
    }

    card.innerHTML = `
        <p class="q-eyebrow">${q.eyebrow}</p>
        <h2 class="q-title">${q.title}</h2>
        <p class="q-sub">${q.sub}</p>
        ${optionsHTML}
        <div class="q-nav">
            ${current > 0 ? `<button class="btn-prev" onclick="prevQ()">← 이전</button>` : ''}
            <button class="btn-next" id="btnNext" onclick="nextQ()">
                ${current === questions.length - 1 ? '결과 보기' : '다음 →'}
            </button>
        </div>
    `;

    // restore selection if exists
    if (answers[q.id] !== undefined) {
        const savedIdx = answers[q.id].idx;
        const els = card.querySelectorAll('.opt, .mood-opt');
        if (els[savedIdx]) els[savedIdx].classList.add('selected');
        document.getElementById('btnNext').classList.add('active');
    }
}

function selectOpt(idx) {
    const q = questions[current];
    const els = document.querySelectorAll('.opt, .mood-opt');
    els.forEach(e => e.classList.remove('selected'));
    els[idx].classList.add('selected');
    answers[q.id] = { idx, tags: q.options[idx].tags };
    document.getElementById('btnNext').classList.add('active');
}

function nextQ() {
    if (!answers[questions[current].id]) return;
    if (current < questions.length - 1) {
        current++;
        renderQuestion();
    } else {
        clearInterval(timerInterval);
        showResult();
    }
}

function prevQ() {
    if (current > 0) { current--; renderQuestion(); }
}

// ══════════════════════════════════════════
// COMPUTE RESULT
// ══════════════════════════════════════════
function computeResult() {
    const tagCounts = {};
    Object.values(answers).forEach(a => {
        (a.tags || []).forEach(t => {
            tagCounts[t] = (tagCounts[t] || 0) + 1;
        });
    });

    let best = resultTypes[0], bestScore = -1;
    resultTypes.forEach(rt => {
        const score = rt.tags.reduce((sum, t) => sum + (tagCounts[t] || 0), 0);
        if (score > bestScore) { bestScore = score; best = rt; }
    });
    return best;
}

        </div>
    `;

    showScreen('screen-result');
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function retryQuiz() {
    showScreen('screen-intro');
}
