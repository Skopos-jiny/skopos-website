<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Cormorant+Garamond:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --pink:#E91E8C;--orange:#FF9800;--green:#7CB342;--blue:#29B6F6;
  --dark:#0F0F1A;--mid:#2A2A3C;--gray:#8890A4;
  --bg:#F7F8FC;--white:#fff;
  --gold:#C9A96E;--gold-lt:#E8D5B0;
  --radius:16px;--ez:cubic-bezier(.22,1,.36,1);
  --sh:0 4px 24px rgba(15,15,26,.08);
}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth}
body{font-family:'Nunito',sans-serif;background:var(--bg);color:var(--dark);overflow-x:hidden;-webkit-font-smoothing:antialiased}
.hl{color:var(--pink);font-style:normal;font-weight:800}
em{font-style:normal}
a{text-decoration:none}

/* NAV */
nav{position:fixed;top:0;left:0;right:0;z-index:200;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 24px;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-bottom:1px solid rgba(0,0,0,.06)}
.nav-brand{font-size:1.1rem;font-weight:900;letter-spacing:-.02em;color:var(--dark)}
.nav-brand span{color:var(--pink)}
.nav-right{display:flex;align-items:center;gap:8px}
.nav-tag{font-size:.7rem;font-weight:700;background:linear-gradient(135deg,var(--pink),var(--orange));color:#fff;padding:4px 12px;border-radius:50px}

/* SCREENS */
.screen{display:none;min-height:100vh;padding:72px 24px 60px}
.screen.active{display:flex;flex-direction:column;align-items:center;justify-content:center}

/* ── PAYMENT GATE ── */
#sp{background:linear-gradient(135deg,#0F0F1A 0%,#1E1040 100%);position:relative;overflow:hidden}
#sp::before{content:'';position:absolute;top:-100px;left:-100px;width:400px;height:400px;border-radius:50%;background:radial-gradient(circle,rgba(233,30,140,.15) 0%,transparent 70%);pointer-events:none}
#sp::after{content:'';position:absolute;bottom:-80px;right:-80px;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(255,152,0,.12) 0%,transparent 70%);pointer-events:none}
.gate-inner{position:relative;z-index:1;text-align:center;max-width:560px;width:100%}
.gate-badge{display:inline-flex;align-items:center;gap:7px;border:1px solid rgba(201,169,110,.3);padding:5px 16px;border-radius:50px;margin-bottom:20px;background:rgba(201,169,110,.06)}
.gate-badge span{font-size:.6rem;letter-spacing:.22em;text-transform:uppercase;color:var(--gold)}
.gate-title{font-family:'Cormorant Garamond',serif;font-size:clamp(2rem,5vw,3.2rem);font-weight:300;color:#fff;line-height:1.2;margin-bottom:12px}
.gate-title em{color:var(--gold)}
.gate-sub{font-size:.9rem;color:rgba(255,255,255,.55);line-height:1.8;margin-bottom:32px}
.features-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:32px;text-align:left}
.feat{border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);border-radius:12px;padding:14px 16px}
.feat-icon{font-size:1.2rem;margin-bottom:6px}
.feat-title{font-size:.82rem;font-weight:700;color:#fff;margin-bottom:3px}
.feat-desc{font-size:.72rem;color:rgba(255,255,255,.45);line-height:1.5}
.price-box{border:1px solid rgba(201,169,110,.3);background:rgba(201,169,110,.06);border-radius:16px;padding:20px;margin-bottom:20px}
.price-row{display:flex;align-items:center;justify-content:center;gap:16px;margin-bottom:6px}
.price-val{font-size:2.6rem;font-weight:900;color:#fff}
.price-note{font-size:.72rem;color:rgba(255,255,255,.4);line-height:1.5}
.btn-pay{width:100%;padding:17px;background:linear-gradient(135deg,var(--pink),#FF6B9D);color:#fff;border:none;border-radius:50px;font-family:'Nunito',sans-serif;font-size:1rem;font-weight:800;cursor:pointer;transition:all .25s;box-shadow:0 6px 24px rgba(233,30,140,.35);margin-bottom:10px}
.btn-pay:hover{transform:translateY(-2px);box-shadow:0 10px 36px rgba(233,30,140,.45)}
.btn-demo{width:100%;padding:13px;background:none;border:1px solid rgba(255,255,255,.15);color:rgba(255,255,255,.6);border-radius:50px;font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:600;cursor:pointer;transition:all .2s}
.btn-demo:hover{border-color:rgba(255,255,255,.4);color:#fff}
.guarantee{font-size:.7rem;color:rgba(255,255,255,.3);margin-top:12px}

/* ── QUIZ ── */
#sq{background:var(--bg);padding-top:80px;justify-content:flex-start}
.q-top{position:fixed;top:60px;left:0;right:0;z-index:100;background:rgba(247,248,252,.95);backdrop-filter:blur(12px);padding:12px 24px;border-bottom:1px solid rgba(0,0,0,.06)}
.q-top-inner{max-width:740px;margin:0 auto}
.q-progress-bar{height:4px;background:rgba(0,0,0,.06);border-radius:2px;overflow:hidden;margin-bottom:8px}
.q-progress-fill{height:100%;background:linear-gradient(90deg,var(--pink),var(--orange));border-radius:2px;transition:width .5s var(--ez)}
.q-meta{display:flex;justify-content:space-between;align-items:center}
.q-section-info{display:flex;align-items:center;gap:8px}
.q-sec-dot{width:8px;height:8px;border-radius:50%;background:var(--sec-color,var(--pink))}
.q-sec-label{font-size:.72rem;font-weight:700;color:var(--dark)}
.q-sec-sub{font-size:.65rem;color:var(--gray)}
.q-count{font-size:.72rem;font-weight:700;color:var(--gray)}
.q-timer-bar{height:2px;background:rgba(0,0,0,.04);margin-top:8px}
.q-timer-fill{height:2px;background:var(--pink);transition:width linear}
.q-timer-fill.warn{background:#E07070}

.qshell{width:100%;max-width:740px;margin:0 auto;padding-top:100px}
.qcard{animation:fadeUp .3s var(--ez) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}
.q-num{font-size:.62rem;letter-spacing:.2em;text-transform:uppercase;color:var(--gray);margin-bottom:8px}
.q-insight{display:inline-block;background:rgba(233,30,140,.06);border:1px solid rgba(233,30,140,.15);padding:4px 12px;font-size:.65rem;color:rgba(233,30,140,.7);border-radius:4px;margin-bottom:16px}
.qtitle{font-size:clamp(1.1rem,2.8vw,1.6rem);font-weight:800;line-height:1.4;margin-bottom:24px;color:var(--dark)}

/* Scale 타입 */
.scale-wrap{display:flex;flex-direction:column;gap:0;background:var(--white);border-radius:var(--radius);overflow:hidden;box-shadow:var(--sh)}
.scale-labels{display:flex;justify-content:space-between;padding:12px 16px 8px;border-bottom:1px solid rgba(0,0,0,.05)}
.scale-label{font-size:.65rem;color:var(--gray);font-weight:600}
.scale-opts{display:flex;gap:0}
.scale-opt{flex:1;padding:16px 8px;display:flex;flex-direction:column;align-items:center;gap:6px;cursor:pointer;border-right:1px solid rgba(0,0,0,.05);transition:all .15s;background:transparent;border-top:none;border-bottom:none;border-left:none;font-family:'Nunito',sans-serif}
.scale-opt:last-child{border-right:none}
.scale-opt:hover{background:rgba(233,30,140,.04)}
.scale-opt.sel{background:rgba(233,30,140,.08)}
.scale-dot{width:22px;height:22px;border-radius:50%;border:2px solid rgba(0,0,0,.12);transition:all .15s}
.scale-opt:hover .scale-dot{border-color:var(--pink)}
.scale-opt.sel .scale-dot{background:var(--pink);border-color:var(--pink)}
.scale-num{font-size:.7rem;font-weight:700;color:var(--gray)}
.scale-opt.sel .scale-num{color:var(--pink)}

/* Choice 타입 */
.choice-opts{display:flex;flex-direction:column;gap:10px}
.choice-opt{background:var(--white);border:1.5px solid rgba(0,0,0,.07);border-radius:var(--radius);padding:16px 18px;cursor:pointer;display:flex;align-items:center;gap:14px;transition:all .15s;text-align:left;font-family:'Nunito',sans-serif;width:100%}
.choice-opt:hover{border-color:rgba(233,30,140,.3);background:rgba(233,30,140,.03);transform:translateX(3px)}
.choice-opt.sel{border-color:var(--pink);background:rgba(233,30,140,.06)}
.choice-icon{font-size:1.3rem;flex-shrink:0;width:28px;text-align:center}
.choice-body{flex:1}
.choice-label{font-size:.9rem;font-weight:700;color:var(--dark);margin-bottom:2px}
.choice-desc{font-size:.75rem;color:var(--gray);line-height:1.4}
.choice-check{width:18px;height:18px;border-radius:50%;border:2px solid rgba(0,0,0,.12);flex-shrink:0;transition:all .15s;display:flex;align-items:center;justify-content:center}
.choice-opt.sel .choice-check{background:var(--pink);border-color:var(--pink)}
.choice-check-inner{width:6px;height:6px;border-radius:50%;background:#fff;opacity:0;transition:opacity .15s}
.choice-opt.sel .choice-check-inner{opacity:1}

.q-skip-hint{font-size:.65rem;color:var(--gray);text-align:center;margin-top:12px;height:16px}
.q-timer-txt{font-size:.75rem;font-weight:700;color:var(--gray);transition:color .3s}
.q-timer-txt.warn{color:#E07070}

/* ── LOADING ── */
#sl{text-align:center;background:linear-gradient(135deg,#0F0F1A,#1E1040)}
.ld-icon{font-size:3rem;margin-bottom:20px;animation:spin 3s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-title{font-family:'Cormorant Garamond',serif;font-size:1.8rem;font-weight:300;color:#fff;margin-bottom:10px}
.ld-sub{font-size:.82rem;color:rgba(255,255,255,.5);line-height:1.7}
.ld-stages{display:flex;gap:8px;margin-top:28px;flex-wrap:wrap;justify-content:center}
.ld-stage{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:50px;font-size:.7rem;border:1px solid rgba(255,255,255,.1);color:rgba(255,255,255,.4);transition:all .5s}
.ld-stage.on{border-color:var(--pink);color:var(--pink);background:rgba(233,30,140,.08)}
.ld-stage.done{border-color:rgba(255,255,255,.2);color:rgba(255,255,255,.6)}

/* ── RESULT ── */
#sr{background:var(--bg);align-items:flex-start;padding-top:80px}
.rw{max-width:780px;width:100%;margin:0 auto}

/* 결과 헤더 */
.r-hero{background:linear-gradient(135deg,#0F0F1A,#1E1040);border-radius:24px;padding:36px;margin-bottom:24px;position:relative;overflow:hidden;text-align:center}
.r-hero::before{content:'';position:absolute;top:-60px;right:-60px;width:200px;height:200px;border-radius:50%;background:var(--pink);opacity:.1}
.r-hero-tag{font-size:.6rem;letter-spacing:.25em;text-transform:uppercase;color:var(--gold);margin-bottom:12px}
.r-emoji{font-size:3.5rem;margin-bottom:10px;display:block}
.r-type-name{font-family:'Cormorant Garamond',serif;font-size:clamp(1.8rem,4vw,2.8rem);font-weight:300;color:#fff;line-height:1.2;margin-bottom:8px}

/* 2줄 시각 위계 — 수식어(위, 작게) + 강조어+유형(아래, 크게) */
.r-type-name-2lines{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  margin-bottom:14px;
  line-height:1.25;
  padding:0 12px;
}
.r-type-name-2lines .r-type-prefix{
  display:block;
  font-family:'Noto Sans KR','Nunito',sans-serif;
  font-size:clamp(.95rem, 2vw, 1.2rem);
  font-weight:500;
  color:rgba(255,255,255,.72);
  letter-spacing:-.01em;
  line-height:1.5;
  word-break:keep-all;
}
.r-type-name-2lines .r-type-main{
  display:block;
  font-family:'Cormorant Garamond','Noto Sans KR',serif;
  font-size:clamp(1.9rem, 4.2vw, 2.9rem);
  font-weight:400;
  color:#fff;
  letter-spacing:-.02em;
  line-height:1.25;
  word-break:keep-all;
}
.r-type-name-2lines .r-type-main .hl{
  color:var(--pink, #DC1478);
  font-weight:500;
}

@media(max-width:600px){
  .r-type-name-2lines{gap:6px;padding:0 8px}
  .r-type-name-2lines .r-type-prefix{font-size:.92rem}
  .r-type-name-2lines .r-type-main{font-size:1.7rem}
}
@media(max-width:380px){
  .r-type-name-2lines .r-type-prefix{font-size:.86rem}
  .r-type-name-2lines .r-type-main{font-size:1.5rem}
}

.r-type-plain{font-size:.78rem;font-weight:700;color:var(--gold);letter-spacing:.1em;text-transform:uppercase;margin-bottom:16px}
.r-desc{font-size:.9rem;color:rgba(255,255,255,.65);line-height:1.85;max-width:520px;margin:0 auto 20px}
.r-keys{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.r-key{border:1px solid rgba(201,169,110,.3);padding:4px 13px;font-size:.68rem;color:var(--gold);border-radius:4px}

/* 레이더 차트 */
.radar-section{background:var(--white);border-radius:var(--radius);padding:28px;margin-bottom:20px;box-shadow:var(--sh)}
.radar-title{font-size:.72rem;font-weight:800;letter-spacing:.1em;text-transform:uppercase;color:var(--gray);margin-bottom:20px;text-align:center}
